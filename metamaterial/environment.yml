# Recommended environment for the microgen metamaterial module (conda-forge).
#
# Why conda-forge: it ships OpenCASCADE (OCP), VTK, cadquery, and pyvista as
# ABI-matched binaries. This FIXES the VTK rendering DLL failure seen with the
# PyPI/uv venv (vtkRenderingMatplotlib could not load there). Verified: offscreen
# rendering works here, so previews can use pyvista natively.
#
# Two-step install (microgen / gmsh / typish are not on conda-forge in an
# importable form, and must be pip-installed with --no-deps so they do NOT pull
# PyPI wheels over the conda-forge binaries). Use the helper:
#
#     bash setup_env.sh
#
# or manually:
#     conda env create -f environment.yml
#     conda run -n metamaterial pip install --no-deps "gmsh>=4.13.1,<5" typish microgen
#
# Update conda layer:  conda env update -f environment.yml --prune
# Use:                 conda run -n metamaterial python scripts/generate_metamaterial.py ...
name: metamaterial
channels:
  - conda-forge
dependencies:
  - python=3.12
  - cadquery            # pulls OCP (OpenCASCADE bindings), ABI-matched with vtk
  - vtk
  - pyvista=0.44.*      # microgen requires pyvista <0.45
  - meshio>=5.3.5,<6
  - scipy>=1.13.1,<1.16
  - numpy<2
  - multimethod         # microgen import dep
  - pytest
  - pip
  # microgen / gmsh / typish: installed via setup_env.sh (pip --no-deps), see header.
